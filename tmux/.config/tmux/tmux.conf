# Inspiration: 
# https://github.com/gpakosz/.tmux
# https://github.com/tmux-plugins/tmux-sensible


set -g default-terminal "screen-256color"

# http://superuser.com/a/252717/65504
# `ESC` or `CTRL + [` is delayed for around 1 second
set-option -sg escape-time 0 

# The program running in tmux can react when you switch into or away from their pane.
set -g focus-events on

set -g mouse on

# VIM binding for pane navigation
# `-r` make it repeatable with one `Ctrl+b`

bind -r h select-pane -L  # move left
bind -r j select-pane -D  # move down
bind -r k select-pane -U  # move up
bind -r l select-pane -R  # move right

# Reload config
bind r source ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded!"
